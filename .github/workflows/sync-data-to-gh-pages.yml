name: Sync data.js to gh-pages

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/data.js'

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        ref: main
    
    - name: Get data.js content
      id: get_data
      run: |
        cat .github/workflows/data.js > /tmp/data.js
    
    - name: Checkout gh-pages branch
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages-checkout
    
    - name: Copy data.js to gh-pages
      run: |
        cp /tmp/data.js gh-pages-checkout/data.js
    
    - name: Commit and push to gh-pages
      working-directory: gh-pages-checkout
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data.js
        git commit -m "Auto-sync: Update data.js from main branch" || echo "No changes to commit"
        git push origin gh-pages
