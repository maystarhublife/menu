<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>MAY STAR MENU</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#111;
    color:#fff;

    display:flex;
    flex-direction:column;

    overflow:hidden;
}


/* ================= HEADER ================= */

.header{

    height:60px;

    background:#b30000;

    display:flex;

    align-items:center;

    justify-content:center;

    position:relative;

    flex-shrink:0;

}

.company{

    font-size:30px;

    font-weight:bold;

    letter-spacing:1px;

}

.clock{

    position:absolute;

    right:15px;

    font-size:21px;

    font-weight:bold;

}



/* ================= MENU ================= */

.menu{

    flex:1;

    display:flex;

    flex-direction:column;

    justify-content:space-evenly;

    padding:3px;

    gap:2px;

    overflow:hidden;

}

.row{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:3px;

    flex:1;

}

.item{

    display:grid;

    grid-template-columns:40px 1fr 110px;

    align-items:center;

    background:#222;

    border-radius:4px;

    padding:1px 6px;

    min-height:0;

}

.no{

    color:#FFD700;

    font-size:15px;

    font-weight:bold;

    text-align:center;

}

.name{

    font-size:16px;

    font-weight:bold;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;

}

.status{

    font-size:15px;

    font-weight:bold;

    text-align:center;

    white-space:nowrap;

}

.ready{

    color:#00ff66;

}

.sold{

    color:#ff3333;

}

.empty{

    visibility:hidden;

}



/* ================= FOOTER ================= */

.footer{

    height:30px;

    background:#b30000;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:15px;

    font-weight:bold;

    flex-shrink:0;

}

</style>

</head>

<body>

<div class="header">

<div class="company">

⭐ MAY STAR RESTAURANT MENU ⭐

</div>

<div class="clock" id="clock"></div>

</div>

<div class="menu" id="menu"></div>

<div class="footer">

🔥 HOT MENU DAILY | FRESH & DELICIOUS | THANK YOU ⭐

</div>

<script>

//================ CREATE ITEM =================

function makeItem(item){

    if(!item){

        return '<div class="item empty"></div>';

    }

    let status="";
    let color="";

    if(item[2].toUpperCase()=="READY"){

        status="READY";
        color="ready";

    }else{

        status="SOLD OUT";
        color="sold";

    }

    return `

<div class="item">

<div class="no">${item[0]}</div>

<div class="name">${item[1].toUpperCase()}</div>

<div class="status ${color}">${status}</div>

</div>

`;

}


//================ LOAD MENU =================

function loadMenu(){

    let old=document.getElementById("dataScript");

    if(old){

        old.remove();

    }


    let script=document.createElement("script");

    script.id="dataScript";


    const timestamp = Date.now();

    const random = Math.random().toString(36).substring(2,15);


    script.src = `data.js?t=${timestamp}&r=${random}`;

    script.cache=false;


    window.menu = undefined;


    script.onload=function(){


        let html="";


        let half=Math.ceil(menu.length/2);



        for(let i=0;i<half;i++){


            html += `

            <div class="row">

                ${makeItem(menu[i])}

                ${makeItem(menu[i+half])}

            </div>

            `;

        }


        document.getElementById("menu").innerHTML=html;


    };


    script.onerror=function(){

        console.error("Gagal membaca data.js");

    };


    document.body.appendChild(script);


}



// load pertama

loadMenu();



// refresh data setiap 5 detik

setInterval(loadMenu,5000);




//================ CLOCK =================


function updateClock(){

    let now=new Date();


    document.getElementById("clock").innerHTML =

    now.toLocaleTimeString([],{

        hour:'2-digit',

        minute:'2-digit'

    });


}


updateClock();


setInterval(updateClock,1000);


</script>


</body>

</html>
